<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chemistry Quiz Game</title>

<style>

.gameBox{

width:700px;
margin:auto;
margin-top:100px;

}

.questionArea{

margin-bottom:40px;
font-size:28px;

}

.choicesGrid{

display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:20px;

}

.choicesGrid button{

width:100%;
padding:20px;
font-size:20px;
border-radius:15px;
background:#2563eb;
color:white;
border:none;
cursor:pointer;
transition:0.2s;

}

.choicesGrid button:hover{

transform:scale(1.05);
background:#1e40af;

}

body{
margin:0;
font-family:tahoma;
background:url("lobby.jpeg");
background-size:cover;
color: aquamarine;
text-align:center;
}

.screen{

display:none;

}

  display:none;
  justify-content:center;

}

#menu{
    display:flex;
    justify-content:center;
    align-items:center;

}

.box{
    background:rgba(0,0,0,0.75);

}

button{

padding:15px;
margin:10px;
width:220px;
font-size:18px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
cursor:pointer;

}

button:hover{

background:#1d4ed8;

}

input[type=range]{

width:200px;

}

/* ไอคอนมุมขวาล่าง */
#loginIcon{
  position: fixed;
  bottom: 20px;
  right: 20px;
  font-size: 30px;
  background: #00ffcc;
  width: 55px;
  height: 55px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;

}

/* พื้นหลังมืดตอนเปิด login */
#loginPopup{
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  display: none;
  justify-content: center;
  align-items: center;
}

/* กล่อง login */
.loginBox{
  background: #111;
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  box-shadow: 0 0 20px #00ffcc;
}

.loginBox input{
  margin: 10px;
  padding: 8px;
}

#profilePopup{
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.profileBox{
  background:#111;
  padding:30px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 0 20px #00ffcc;
}

.avatarWrapper{
  width:120px;
  height:120px;
  border-radius:50%;
  overflow:hidden;
  margin:10px auto;
  border:3px solid #00ffcc;
  box-shadow:0 0 20px #00ffcc;
}

.avatarWrapper img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.uploadBtn{
  display:inline-block;
  margin-top:15px;
  padding:10px 20px;
  border-radius:25px;
  background:linear-gradient(45deg,#2563eb,#06b6d4);
  cursor:pointer;
  color:white;
  font-size:14px;
}

.uploadBtn input{
  display:none;
}

.inputGroup{
  position:relative;
  margin:20px 0;
}

.inputGroup input{
  width:260px;
  padding:14px;
  border-radius:30px;
  border:2px solid #00ffcc;
  background:rgba(0,0,0,0.6);
  color:white;
  outline:none;
  font-size:14px;
  transition:0.3s;
}

.inputGroup input:focus{
  box-shadow:0 0 15px #00ffcc;
  transform:scale(1.05);
}

.inputGroup label{
  position:absolute;
  left:20px;
  top:14px;
  color:#aaa;
  pointer-events:none;
  transition:0.3s;
}

.inputGroup input:focus + label,
.inputGroup input:valid + label{
  top:-10px;
  font-size:12px;
  color:#00ffcc;
  background:#111;
  padding:0 6px;
}

/* กล่องเปลี่ยนชื่อแบบใหม่ */
.nameChangeBox{
  position:relative;
  margin-top:25px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:15px;
}

.nameChangeBox input{
  width:280px;
  padding:14px;
  border-radius:30px;
  border:2px solid #00ffcc;
  background:rgba(0,0,0,0.6);
  color:white;
  outline:none;
  font-size:15px;
  transition:0.3s;
  text-align:center;
}

.nameChangeBox input:focus{
  box-shadow:0 0 20px #00ffcc;
  transform:scale(1.05);
}

.nameChangeBox label{
  position:absolute;
  top:-10px;
  font-size:13px;
  color:#00ffcc;
  background:#111;
  padding:0 8px;
}

/* END SCREEN */

#end{

display:none;

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

justify-content:center;
align-items:center;

}

.endBox{

background:rgba(0,0,0,0.6);

padding:40px;

border-radius:20px;

text-align:center;

box-shadow:0 0 30px rgba(0,255,255,0.5);

}
/* ========================= */
/* GLOBAL ANIMATION */
/* ========================= */

.screen{

animation:fadeIn 0.5s ease;

}

@keyframes fadeIn{

from{

opacity:0;
transform:translateY(20px);

}

to{

opacity:1;
transform:translateY(0);

}

}



/* ========================= */
/* MENU BOX */
/* ========================= */

.box{

background:rgba(0,0,0,0.75);
padding:30px;
border-radius:20px;
display:inline-block;
min-width:300px;

backdrop-filter:blur(10px);

box-shadow:
0 0 20px rgba(0,255,255,0.4),
0 0 60px rgba(0,255,255,0.2);

animation:pop 0.5s ease;

}

@keyframes pop{

from{

transform:scale(0.8);
opacity:0;

}

to{

transform:scale(1);
opacity:1;

}

}



/* ========================= */
/* BUTTON */
/* ========================= */

button{

padding:15px;
margin:10px;
width:220px;
font-size:18px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,#2563eb,#06b6d4);
color:white;
cursor:pointer;

transition:0.3s;

box-shadow:0 5px 15px rgba(0,0,0,0.4);

}

button:hover{

transform:translateY(-3px) scale(1.05);

box-shadow:0 10px 25px rgba(0,0,0,0.6);

}

button:active{

transform:scale(0.95);

}



/* ========================= */
/* QUESTION */
/* ========================= */

.questionArea{

margin-bottom:40px;
font-size:32px;

animation:fadeIn 0.5s;

}



/* ========================= */
/* CHOICES */
/* ========================= */

.choicesGrid button{

background:linear-gradient(45deg,#2563eb,#06b6d4);

position:relative;

overflow:hidden;

}



.choicesGrid button::after{

content:"";

position:absolute;

width:100%;
height:100%;

background:rgba(255,255,255,0.2);

top:0;
left:-100%;

transition:0.4s;

}

.choicesGrid button:hover::after{

left:100%;

}



/* ========================= */
/* RESULT TEXT */
/* ========================= */

#result{

font-size:24px;

animation:fadeIn 0.5s;

}



/* ========================= */
/* SCORE */
/* ========================= */

#score{

font-size:24px;

color:#00ffff;

text-shadow:

0 0 10px cyan,
0 0 20px cyan;

}



/* ========================= */
/* END BOX */
/* ========================= */

.endBox{

background:rgba(0,0,0,0.7);

padding:40px;

border-radius:20px;

text-align:center;

box-shadow:

0 0 20px cyan,
0 0 60px cyan;

animation:pop 0.6s;

}



/* ========================= */
/* TITLE GLOW */
/* ========================= */

h1{

text-shadow:

0 0 10px cyan,
0 0 20px cyan,
0 0 40px cyan;

}



/* ========================= */
/* BACKGROUND ANIMATION */
/* ========================= */

body{

animation:bgZoom 20s infinite alternate ease-in-out;

}

@keyframes bgZoom{

from{

background-size:100%;

}

to{

background-size:110%;

}

}

/* COUNTDOWN */

#countdown{

position:fixed;
top:50%;
left:50%;

transform:translate(-50%,-50%);

font-size:120px;
font-weight:bold;

color:white;

text-shadow:
0 0 20px cyan,
0 0 40px cyan,
0 0 80px cyan;

opacity:0;

pointer-events:none;

z-index:999;

}

.countAnim{

animation:countPop 0.5s;

}

@keyframes countPop{

0%{

transform:translate(-50%,-50%) scale(0.5);
opacity:0;

}

50%{

transform:translate(-50%,-50%) scale(1.2);
opacity:1;

}

100%{

transform:translate(-50%,-50%) scale(1);
opacity:1;

}

}

.matchGrid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
  margin-top:20px;
}

.card{

  padding:20px;
  border-radius:10px;
  cursor:pointer;
  color:white;
  font-size:18px;
}

.card.flipped{
  background:#06b6d4;
}

.card.matched{

}

</style>
</head>

<body>

<!-- MENU -->

<!-- MENU -->
<div id="menu" class="screen">
  <div class="box">
    <h1>CHEMISTRY QUIZ</h1>
    <button onclick="goToModeSelect()">เริ่มเกม</button>
    <button onclick="openSettings()">ตั้งค่า</button>
  </div>
</div>

<!-- เลือกโหมดเกม -->
<div id="modeSelect" class="screen">
  <div class="box">
    <h2>เลือกโหมดเกม</h2>
    <button onclick="startMatching()">เกมจับคู่สารเคมี</button>
    <button onclick="startGuessing()">เกมทายชื่อสารเคมี</button>
    <button onclick="startMining()">เกมขุดหาแร่</button>
    <br><br>
    <button onclick="goToMenu()">กลับ</button>
  </div>
</div>

<!-- MATCHING GAME -->
<div id="matchingGame" class="screen">
  <div class="box">
    <h2>เกมจับคู่สารเคมี</h2>
    <div class="matchGrid" id="matchGrid"></div>
    <br>
    <button onclick="goToModeSelect()">กลับ</button>
  </div>
</div>

<!-- SETTINGS -->

<div id="settings" class="screen">

<div class="box">

<h2>⚙️ ตั้งค่าเสียง</h2>

เพลง<br>
<input type="range" id="musicSlider"
min="0" max="1" step="0.01">

<br><br>

เอฟเฟกต์<br>
<input type="range" id="sfxSlider"
min="0" max="1" step="0.01">

<br><br>

<button onclick="closeSettings()">กลับ</button>

</div>

</div>



<!-- GAME -->

<div id="game" class="screen">

<div class="box gameBox">

<div class="questionArea">

<h2 id="question"></h2>

</div>

<div id="choices" class="choicesGrid"></div>

<h3 id="result"></h3>

<h3 id="score">คะแนน: 0</h3>

</div>

<!-- COUNTDOWN -->

<div id="countdown">

</div>

</div>

<!-- END -->

<div id="end" class="screen">

<div class="endBox">

<h1>🎉 ยินดีด้วย!</h1>

<h2 id="finalScore"></h2>

<h1 id="rank"></h1>

<button onclick="backMenu()">กลับ Menu</button>

</div>

</div>



<!-- SOUND -->

<audio id="menuMusic" src="menu.mp3" loop></audio>

<audio id="gameMusic" src="bg.mp3" loop></audio>

<audio id="correctSound" src="correct.mp3"></audio>

<audio id="wrongSound" src="wrong.mp3"></audio>

<audio id="countSound" src="count.mp3"></audio>

<audio id="startSound" src="start.mp3"></audio>

<script>

let isLogin = true;

function openProfile(){
  let currentUser = localStorage.getItem("currentUser");
  let data = JSON.parse(localStorage.getItem("userData"));

  if(currentUser && data){

    document.getElementById("profileName").innerText = data.username;
    document.getElementById("highScore").innerText = data.highScore;
    document.getElementById("playCount").innerText = data.playCount;
    document.getElementById("avatarImage").src = data.avatar || "";

    document.getElementById("profilePopup").style.display="flex";

  } else {
    openLogin();
  }
}

function changeName(){
  let data = JSON.parse(localStorage.getItem("userData"));
  let newName = document.getElementById("newName").value;

  if(newName){
    data.username = newName;
    localStorage.setItem("userData", JSON.stringify(data));
    alert("เปลี่ยนชื่อแล้ว");
    openProfile();
  }
}

function closeProfile(){
  document.getElementById("profilePopup").style.display="none";
}

function logout(){
  localStorage.removeItem("currentUser");
  alert("ออกจากระบบแล้ว");
  closeProfile();
}

function openLogin(){
  document.getElementById("loginPopup").style.display="flex";
}

function closeLogin(){
  document.getElementById("loginPopup").style.display="none";
}

function switchForm(){
  isLogin = !isLogin;

  if(isLogin){
    formTitle.innerText = "Login";
    mainBtn.innerText = "เข้าสู่ระบบ";
    switchText.innerHTML = `
      ยังไม่มีบัญชี?
      <span onclick="switchForm()" style="color:#00ffcc; cursor:pointer;">
        สมัครสมาชิก
      </span>
    `;
  } else {
    formTitle.innerText = "Register";
    mainBtn.innerText = "สมัครสมาชิก";
    switchText.innerHTML = `
      มีบัญชีแล้ว?
      <span onclick="switchForm()" style="color:#00ffcc; cursor:pointer;">
        เข้าสู่ระบบ
      </span>
    `;
  }
}

function submitForm(){

  let user = document.getElementById("username").value;
  let pass = document.getElementById("password").value;

  if(!user || !pass){
    alert("กรอกข้อมูลให้ครบก่อน");
    return;
  }

  let savedData = JSON.parse(localStorage.getItem("userData"));

  if(isLogin){

    // ===== LOGIN =====
    if(savedData &&
       savedData.username === user &&
       savedData.password === pass){

        localStorage.setItem("currentUser", user);
        alert("เข้าสู่ระบบสำเร็จ!");
        closeLogin();
        openProfile();
    }else{
        alert("ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง");
    }

  }else{

    // ===== REGISTER =====
    let userData = {
      username: user,
      password: pass,
      highScore: 0,
      playCount: 0,
      avatar: "👤"
    };

    localStorage.setItem("userData", JSON.stringify(userData));
    alert("สมัครสมาชิกสำเร็จ!");
    switchForm();

  }
}

// QUESTIONS

let questions=[

{

q:"กระบวนการที่ใช้ไฟฟ้าแยกสารเรียกว่าอะไร?",

c:["อิเล็กโทรลิซิส","ออกซิเดชัน","รีดักชัน","การเผาไหม้"],

a:0,

info:"Electrolysis คือการใช้ไฟฟ้าแยกสาร"

},

{

q:"ขั้วที่เกิดการรับอิเล็กตรอนเรียกว่าอะไร?",

c:["แอโนด","แคโทด","อิเล็กโทรด","สะพานเกลือ"],

a:1,

info:"Cathode คือขั้วที่เกิด Reduction"

},

{

q:"ขั้วที่เกิดการเสียอิเล็กตรอนเรียกว่าอะไร?",

c:["แอโนด","แคโทด","นิวตรอน","โปรตอน"],

a:0,

info:"Anode คือขั้วที่เกิด Oxidation"

},

{

q:"สารที่นำไฟฟ้าในสารละลายเรียกว่าอะไร?",

c:["อิเล็กโทรไลต์","นิวเคลียส","โปรตอน","อะตอม"],

a:0,

info:"Electrolyte คือสารที่นำไฟฟ้าได้"

},

{

q:"แบตเตอรี่จัดเป็นเซลล์ชนิดใด?",

c:["เซลล์กัลวานิก","เซลล์ไฟฟ้า","เซลล์แสง","เซลล์เคมี"],

a:0,

info:"Battery คือ Galvanic Cell"

},

{

q:"กระแสไฟฟ้าเกิดจากการเคลื่อนที่ของอะไร?",

c:["โปรตอน","อิเล็กตรอน","นิวตรอน","อะตอม"],

a:1,

info:"กระแสไฟฟ้าเกิดจาก Electron"

},

{

q:"การเคลือบโลหะด้วยไฟฟ้าเรียกว่าอะไร?",

c:["Electroplating","Electrolysis","Oxidation","Reduction"],

a:0,

info:"Electroplating คือการเคลือบโลหะ"

},

{

q:"สะพานเกลือมีหน้าที่อะไร?",

c:["เพิ่มไฟฟ้า","เชื่อมวงจรไฟฟ้า","เพิ่มอุณหภูมิ","ลดแรงดัน"],

a:1,

info:"Salt bridge ช่วยให้วงจรสมบูรณ์"

},

{

q:"หน่วยของแรงดันไฟฟ้าคืออะไร?",

c:["แอมป์","โวลต์","วัตต์","โอห์ม"],

a:1,

info:"Voltage มีหน่วยเป็น Volt"

},

{

q:"Oxidation คืออะไร?",

c:["รับอิเล็กตรอน","เสียอิเล็กตรอน","รับโปรตอน","เสียโปรตอน"],

a:1,

info:"Oxidation คือการเสีย Electron"

}

]




// SYSTEM

let current=0

let score=0


let menu=document.getElementById("menu")

let settings=document.getElementById("settings")

let game=document.getElementById("game")

let end=document.getElementById("end")



let question=document.getElementById("question")

let choices=document.getElementById("choices")

let result=document.getElementById("result")

let scoreText=document.getElementById("score")

let finalScore=document.getElementById("finalScore")




// SOUND

let menuMusic=document.getElementById("menuMusic")

let gameMusic=document.getElementById("gameMusic")

let correctSound=document.getElementById("correctSound")

let wrongSound=document.getElementById("wrongSound")

let countSound=document.getElementById("countSound")

let startSound=document.getElementById("startSound")

let countdown=document.getElementById("countdown")

let musicSlider=document.getElementById("musicSlider")

let sfxSlider=document.getElementById("sfxSlider")



// LOAD SAVE

musicSlider.value=localStorage.getItem("music") || 0.3

sfxSlider.value=localStorage.getItem("sfx") || 0.5


menuMusic.volume=musicSlider.value
gameMusic.volume=musicSlider.value

correctSound.volume=sfxSlider.value
wrongSound.volume=sfxSlider.value
countSound.volume=sfxSlider.value
startSound.volume=sfxSlider.value

menuMusic.play()



// SLIDER

musicSlider.oninput=function(){

menuMusic.volume=this.value
gameMusic.volume=this.value

localStorage.setItem("music",this.value)

}


sfxSlider.oninput=function(){

correctSound.volume=this.value
wrongSound.volume=this.value
countSound.volume=this.value
startSound.volume=this.value

localStorage.setItem("sfx",this.value)

}




// START
function startCountdown(callback){

let count=3

countdown.style.opacity=1

countdown.innerHTML=count

countSound.play()

countdown.classList.add("countAnim")

let interval=setInterval(()=>{

count--

if(count>0){

countdown.innerHTML=count

countSound.currentTime=0
countSound.play()

countdown.classList.remove("countAnim")
void countdown.offsetWidth
countdown.classList.add("countAnim")

}
else if(count==0){

countdown.innerHTML="START!"

startSound.play()

countdown.classList.remove("countAnim")
void countdown.offsetWidth
countdown.classList.add("countAnim")

}
else{

clearInterval(interval)

countdown.style.opacity=0

callback()

}

},1000)

}

function startGame(){

menu.style.display="none"

menuMusic.pause()

startCountdown(()=>{

game.style.display="block"

gameMusic.play()

current=0

score=0

showQuestion()
let data = JSON.parse(localStorage.getItem("userData"));
if(data){
  data.playCount += 1;
  localStorage.setItem("userData", JSON.stringify(data));
}

})

}

// SHOW QUESTION

function showQuestion(){

result.innerHTML=""

let q=questions[current]

question.innerHTML=q.q


choices.innerHTML=""


for(let i=0;i<q.c.length;i++){

let btn=document.createElement("button")

btn.innerHTML=q.c[i]

btn.onclick=function(){

answer(i)

}

choices.appendChild(btn)

}

}




// ANSWER

function answer(i){

let q=questions[current]

if(i==q.a){

result.innerHTML="✔ ถูกต้อง<br>"+q.info

score+=10

correctSound.play()

}else{

result.innerHTML="❌ ผิด<br>"+q.info

wrongSound.play()

}


scoreText.innerHTML="คะแนน: "+score


current++


setTimeout(()=>{

if(current>=questions.length){

endGame()

}else{

showQuestion()

}

},2000)

}



// END GAME

function endGame(){

game.style.display="none"

end.style.display="flex"

gameMusic.pause()

menuMusic.play()

finalScore.innerHTML="คะแนนของคุณ: "+score


let rankText=""

if(score>=70){

rankText="🏆 Rank S"

}
else if(score>=50){

rankText="🥇 Rank A"

}
else if(score>=30){

rankText="🥈 Rank B"

}
else if(score>=10){

rankText="🥉 Rank C"

}


document.getElementById("rank").innerHTML=rankText
let data = JSON.parse(localStorage.getItem("userData"));
if(data){

document.addEventListener("DOMContentLoaded", function(){

  const upload = document.getElementById("avatarUpload");
  const avatarImg = document.getElementById("avatarImage");

  if(upload){
    upload.addEventListener("change", function(){

      let file = this.files[0];
      if(!file) return;

      let reader = new FileReader();

      reader.onload = function(e){

        let data = JSON.parse(localStorage.getItem("userData")) || {};

        data.avatar = e.target.result;

        localStorage.setItem("userData", JSON.stringify(data));

        avatarImg.src = e.target.result; // อัปเดตทันที
      };

      reader.readAsDataURL(file);

    });
  }

});


</script>

<script>
function showScreen(id){
  document.querySelectorAll('.screen').forEach(screen=>{
    screen.style.display = "none";
  });
  document.getElementById(id).style.display = "flex";
}

function goToModeSelect(){
  showScreen("modeSelect");
}

function goToMenu(){
  showScreen("menu");
}

function startMatching(){
  showScreen("matchingGame");
  initMatchingGame();
}

function startGuessing(){
  alert("เข้าเกมทายชื่อสารเคมี");
}

function startMining(){
  alert("เข้าเกมขุดหาแร่");
}

let firstCard=null;
let lockBoard=false;

function initMatchingGame(){

  const pairs=[
    "H₂O","H₂O",
    "NaCl","NaCl",
    "CO₂","CO₂"
  ];

  const shuffled=pairs.sort(()=>0.5-Math.random());
  const grid=document.getElementById("matchGrid");
  grid.innerHTML="";

  shuffled.forEach(text=>{
    const card=document.createElement("div");
    card.classList.add("card");
    card.dataset.value=text;
    card.innerText="?";

    card.onclick=()=>flipCard(card);

    grid.appendChild(card);
  });

  firstCard=null;
  lockBoard=false;
}

function flipCard(card){

  if(lockBoard || card.classList.contains("flipped")) return;

  card.classList.add("flipped");
  card.innerText=card.dataset.value;

  if(!firstCard){
    firstCard=card;
    return;
  }

  if(firstCard.dataset.value===card.dataset.value){

    firstCard.classList.add("matched");
    card.classList.add("matched");
    firstCard=null;

  }else{

    lockBoard=true;

    setTimeout(()=>{
      firstCard.classList.remove("flipped");
      card.classList.remove("flipped");
      firstCard.innerText="?";
      card.innerText="?";
      firstCard=null;
      lockBoard=false;
    },800);

  }

}

// เปิดหน้าแรกตอนโหลดเว็บ
showScreen("menu");
</script>
