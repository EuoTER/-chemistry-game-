<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chemistry Quiz Game</title>

<style>

.gameBox{

width:700px;
margin:auto;
margin-top:100px;

}

.questionArea{

margin-bottom:40px;
font-size:28px;

}

.choicesGrid{

display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:20px;

}

.choicesGrid button{

width:100%;
padding:20px;
font-size:20px;
border-radius:15px;
background:#2563eb;
color:white;
border:none;
cursor:pointer;
transition:0.2s;

}

.choicesGrid button:hover{

transform:scale(1.05);
background:#1e40af;

}

body{

margin:0;
font-family:tahoma;
background:url("lobby.jpeg");
background-size:cover;
color: aquamarine;
text-align:center;

}

.screen{

display:none;

}

#menu{

display:block;
margin-top:200px;

}

.box{

background:rgba(0,0,0,0.75);
padding:30px;
border-radius:20px;
display:inline-block;
min-width:300px;

}

button{

padding:15px;
margin:10px;
width:220px;
font-size:18px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
cursor:pointer;

}

button:hover{

background:#1d4ed8;

}

input[type=range]{

width:200px;

}
/* END SCREEN */

#end{

display:none;

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

justify-content:center;
align-items:center;

}

.endBox{

background:rgba(0,0,0,0.6);

padding:40px;

border-radius:20px;

text-align:center;

box-shadow:0 0 30px rgba(0,255,255,0.5);

}
/* ========================= */
/* GLOBAL ANIMATION */
/* ========================= */

.screen{

animation:fadeIn 0.5s ease;

}

@keyframes fadeIn{

from{

opacity:0;
transform:translateY(20px);

}

to{

opacity:1;
transform:translateY(0);

}

}



/* ========================= */
/* MENU BOX */
/* ========================= */

.box{

background:rgba(0,0,0,0.75);
padding:30px;
border-radius:20px;
display:inline-block;
min-width:300px;

backdrop-filter:blur(10px);

box-shadow:
0 0 20px rgba(0,255,255,0.4),
0 0 60px rgba(0,255,255,0.2);

animation:pop 0.5s ease;

}

@keyframes pop{

from{

transform:scale(0.8);
opacity:0;

}

to{

transform:scale(1);
opacity:1;

}

}



/* ========================= */
/* BUTTON */
/* ========================= */

button{

padding:15px;
margin:10px;
width:220px;
font-size:18px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,#2563eb,#06b6d4);
color:white;
cursor:pointer;

transition:0.3s;

box-shadow:0 5px 15px rgba(0,0,0,0.4);

}

button:hover{

transform:translateY(-3px) scale(1.05);

box-shadow:0 10px 25px rgba(0,0,0,0.6);

}

button:active{

transform:scale(0.95);

}



/* ========================= */
/* QUESTION */
/* ========================= */

.questionArea{

margin-bottom:40px;
font-size:32px;

animation:fadeIn 0.5s;

}



/* ========================= */
/* CHOICES */
/* ========================= */

.choicesGrid button{

background:linear-gradient(45deg,#2563eb,#06b6d4);

position:relative;

overflow:hidden;

}



.choicesGrid button::after{

content:"";

position:absolute;

width:100%;
height:100%;

background:rgba(255,255,255,0.2);

top:0;
left:-100%;

transition:0.4s;

}

.choicesGrid button:hover::after{

left:100%;

}



/* ========================= */
/* RESULT TEXT */
/* ========================= */

#result{

font-size:24px;

animation:fadeIn 0.5s;

}



/* ========================= */
/* SCORE */
/* ========================= */

#score{

font-size:24px;

color:#00ffff;

text-shadow:

0 0 10px cyan,
0 0 20px cyan;

}



/* ========================= */
/* END BOX */
/* ========================= */

.endBox{

background:rgba(0,0,0,0.7);

padding:40px;

border-radius:20px;

text-align:center;

box-shadow:

0 0 20px cyan,
0 0 60px cyan;

animation:pop 0.6s;

}



/* ========================= */
/* TITLE GLOW */
/* ========================= */

h1{

text-shadow:

0 0 10px cyan,
0 0 20px cyan,
0 0 40px cyan;

}



/* ========================= */
/* BACKGROUND ANIMATION */
/* ========================= */

body{

animation:bgZoom 20s infinite alternate ease-in-out;

}

@keyframes bgZoom{

from{

background-size:100%;

}

to{

background-size:110%;

}

}

/* COUNTDOWN */

#countdown{

position:fixed;
top:50%;
left:50%;

transform:translate(-50%,-50%);

font-size:120px;
font-weight:bold;

color:white;

text-shadow:
0 0 20px cyan,
0 0 40px cyan,
0 0 80px cyan;

opacity:0;

pointer-events:none;

z-index:999;

}

.countAnim{

animation:countPop 0.5s;

}

@keyframes countPop{

0%{

transform:translate(-50%,-50%) scale(0.5);
opacity:0;

}

50%{

transform:translate(-50%,-50%) scale(1.2);
opacity:1;

}

100%{

transform:translate(-50%,-50%) scale(1);
opacity:1;

}

}

</style>
</head>

<body>


<!-- MENU -->

<div id="menu">

<div class="box">

<h1>🧪 CHEMISTRY QUIZ</h1>

<button onclick="startGame()">เริ่มเกม</button>

<button onclick="openSettings()">ตั้งค่า</button>

</div>

</div>



<!-- SETTINGS -->

<div id="settings" class="screen">

<div class="box">

<h2>⚙️ ตั้งค่าเสียง</h2>

เพลง<br>
<input type="range" id="musicSlider"
min="0" max="1" step="0.01">

<br><br>

เอฟเฟกต์<br>
<input type="range" id="sfxSlider"
min="0" max="1" step="0.01">

<br><br>

<button onclick="closeSettings()">กลับ</button>

</div>

</div>



<!-- GAME -->

<div id="game" class="screen">

<div class="box gameBox">

<div class="questionArea">

<h2 id="question"></h2>

</div>

<div id="choices" class="choicesGrid"></div>

<h3 id="result"></h3>

<h3 id="score">คะแนน: 0</h3>

</div>

<!-- COUNTDOWN -->

<div id="countdown">

</div>

</div>

<!-- END -->

<div id="end" class="screen">

<div class="endBox">

<h1>🎉 ยินดีด้วย!</h1>

<h2 id="finalScore"></h2>

<h1 id="rank"></h1>

<button onclick="backMenu()">กลับ Menu</button>

</div>

</div>



<!-- SOUND -->

<audio id="menuMusic" src="menu.mp3" loop></audio>

<audio id="gameMusic" src="bg.mp3" loop></audio>

<audio id="correctSound" src="correct.mp3"></audio>

<audio id="wrongSound" src="wrong.mp3"></audio>

<audio id="countSound" src="count.mp3"></audio>

<audio id="startSound" src="start.mp3"></audio>

<script>


// QUESTIONS

let questions=[

{

q:"กระบวนการที่ใช้ไฟฟ้าแยกสารเรียกว่าอะไร?",

c:["อิเล็กโทรลิซิส","ออกซิเดชัน","รีดักชัน","การเผาไหม้"],

a:0,

info:"Electrolysis คือการใช้ไฟฟ้าแยกสาร"

},

{

q:"ขั้วที่เกิดการรับอิเล็กตรอนเรียกว่าอะไร?",

c:["แอโนด","แคโทด","อิเล็กโทรด","สะพานเกลือ"],

a:1,

info:"Cathode คือขั้วที่เกิด Reduction"

},

{

q:"ขั้วที่เกิดการเสียอิเล็กตรอนเรียกว่าอะไร?",

c:["แอโนด","แคโทด","นิวตรอน","โปรตอน"],

a:0,

info:"Anode คือขั้วที่เกิด Oxidation"

},

{

q:"สารที่นำไฟฟ้าในสารละลายเรียกว่าอะไร?",

c:["อิเล็กโทรไลต์","นิวเคลียส","โปรตอน","อะตอม"],

a:0,

info:"Electrolyte คือสารที่นำไฟฟ้าได้"

},

{

q:"แบตเตอรี่จัดเป็นเซลล์ชนิดใด?",

c:["เซลล์กัลวานิก","เซลล์ไฟฟ้า","เซลล์แสง","เซลล์เคมี"],

a:0,

info:"Battery คือ Galvanic Cell"

},

{

q:"กระแสไฟฟ้าเกิดจากการเคลื่อนที่ของอะไร?",

c:["โปรตอน","อิเล็กตรอน","นิวตรอน","อะตอม"],

a:1,

info:"กระแสไฟฟ้าเกิดจาก Electron"

},

{

q:"การเคลือบโลหะด้วยไฟฟ้าเรียกว่าอะไร?",

c:["Electroplating","Electrolysis","Oxidation","Reduction"],

a:0,

info:"Electroplating คือการเคลือบโลหะ"

},

{

q:"สะพานเกลือมีหน้าที่อะไร?",

c:["เพิ่มไฟฟ้า","เชื่อมวงจรไฟฟ้า","เพิ่มอุณหภูมิ","ลดแรงดัน"],

a:1,

info:"Salt bridge ช่วยให้วงจรสมบูรณ์"

},

{

q:"หน่วยของแรงดันไฟฟ้าคืออะไร?",

c:["แอมป์","โวลต์","วัตต์","โอห์ม"],

a:1,

info:"Voltage มีหน่วยเป็น Volt"

},

{

q:"Oxidation คืออะไร?",

c:["รับอิเล็กตรอน","เสียอิเล็กตรอน","รับโปรตอน","เสียโปรตอน"],

a:1,

info:"Oxidation คือการเสีย Electron"

}

]




// SYSTEM

let current=0

let score=0


let menu=document.getElementById("menu")

let settings=document.getElementById("settings")

let game=document.getElementById("game")

let end=document.getElementById("end")



let question=document.getElementById("question")

let choices=document.getElementById("choices")

let result=document.getElementById("result")

let scoreText=document.getElementById("score")

let finalScore=document.getElementById("finalScore")




// SOUND

let menuMusic=document.getElementById("menuMusic")

let gameMusic=document.getElementById("gameMusic")

let correctSound=document.getElementById("correctSound")

let wrongSound=document.getElementById("wrongSound")

let countSound=document.getElementById("countSound")

let startSound=document.getElementById("startSound")

let countdown=document.getElementById("countdown")

let musicSlider=document.getElementById("musicSlider")

let sfxSlider=document.getElementById("sfxSlider")



// LOAD SAVE

musicSlider.value=localStorage.getItem("music") || 0.3

sfxSlider.value=localStorage.getItem("sfx") || 0.5


menuMusic.volume=musicSlider.value
gameMusic.volume=musicSlider.value

correctSound.volume=sfxSlider.value
wrongSound.volume=sfxSlider.value
countSound.volume=sfxSlider.value
startSound.volume=sfxSlider.value

menuMusic.play()



// SLIDER

musicSlider.oninput=function(){

menuMusic.volume=this.value
gameMusic.volume=this.value

localStorage.setItem("music",this.value)

}


sfxSlider.oninput=function(){

correctSound.volume=this.value
wrongSound.volume=this.value
countSound.volume=this.value
startSound.volume=this.value

localStorage.setItem("sfx",this.value)

}




// START
function startCountdown(callback){

let count=2

countdown.style.opacity=1

countdown.innerHTML=count

countSound.play()

countdown.classList.add("countAnim")

let interval=setInterval(()=>{

count--

if(count>0){

countdown.innerHTML=count

countSound.currentTime=0
countSound.play()

countdown.classList.remove("countAnim")
void countdown.offsetWidth
countdown.classList.add("countAnim")

}
else if(count==0){

countdown.innerHTML="START!"

startSound.play()

countdown.classList.remove("countAnim")
void countdown.offsetWidth
countdown.classList.add("countAnim")

}
else{

clearInterval(interval)

countdown.style.opacity=0

callback()

}

},1000)

}

function startGame(){

menu.style.display="none"

menuMusic.pause()

startCountdown(()=>{

game.style.display="block"

gameMusic.play()

current=0

score=0

showQuestion()

})

}

// SHOW QUESTION

function showQuestion(){

result.innerHTML=""

let q=questions[current]

question.innerHTML=q.q


choices.innerHTML=""


for(let i=0;i<q.c.length;i++){

let btn=document.createElement("button")

btn.innerHTML=q.c[i]

btn.onclick=function(){

answer(i)

}

choices.appendChild(btn)

}

}




// ANSWER

function answer(i){

let q=questions[current]

if(i==q.a){

result.innerHTML="✔ ถูกต้อง<br>"+q.info

score+=10

correctSound.play()

}else{

result.innerHTML="❌ ผิด<br>"+q.info

wrongSound.play()

}


scoreText.innerHTML="คะแนน: "+score


current++


setTimeout(()=>{

if(current>=questions.length){

endGame()

}else{

showQuestion()

}

},2000)

}



// END GAME

function endGame(){

game.style.display="none"

end.style.display="flex"

gameMusic.pause()

menuMusic.play()

finalScore.innerHTML="คะแนนของคุณ: "+score


let rankText=""

if(score>=70){

rankText="🏆 Rank S"

}
else if(score>=50){

rankText="🥇 Rank A"

}
else if(score>=30){

rankText="🥈 Rank B"

}
else if(score>=10){

rankText="🥉 Rank C"

}


document.getElementById("rank").innerHTML=rankText

}



// MENU

function openSettings(){

menu.style.display="none"

settings.style.display="block"

}


function closeSettings(){

settings.style.display="none"

menu.style.display="block"

}


function backMenu(){

location.reload()

}



</script>


</body>
</html>
